services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/migrations:/docker-entrypoint-initdb.d

  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ai-engine:
    build:
      context: .
      dockerfile: infra/docker/ai-engine.Dockerfile
    env_file:
      - .env.example
    ports:
      - "8000:8000"
      - "50051:50051"
    depends_on:
      - qdrant
      - postgres

  gateway:
    build:
      context: .
      dockerfile: infra/docker/gateway.Dockerfile
    env_file:
      - .env.example
    ports:
      - "8080:8080"
    depends_on:
      - ai-engine
      - postgres

volumes:
  pgdata:
  qdrant_data:
